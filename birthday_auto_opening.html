
<style>
*{margin:0;padding:0;box-sizing:border-box;}

#stage {
  width: 100%;
  height: 100vh; /* 画面の高さに合わせる */
  background: #000;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* #gift-scene{position:relative;width:300px;height:340px;} */
#gift-scene {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -40%); /* -50%は中央、-40%にして少し下げる */
  width: 300px;
  height: 340px;
}
#akari-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Arial',sans-serif;font-size:48px;font-weight:700;letter-spacing:0.25em;color:#fff;text-shadow:0 0 40px rgba(255,150,200,0.8);opacity:0;z-index:50;white-space:nowrap;transition:opacity 0.6s,transform 0.7s cubic-bezier(0.34,1.56,0.64,1);}
.balloon{position:absolute;opacity:0;z-index:40;}
#shutter{position:absolute;inset:0;z-index:80;pointer-events:none;}
.shutter-left,.shutter-right{position:absolute;top:0;width:50%;height:100%;background:#000;transition:transform 1s cubic-bezier(0.77,0,0.18,1);}
.shutter-left{left:0;}.shutter-right{right:0;}
.shutter-left.open{transform:translateX(-100%);}.shutter-right.open{transform:translateX(100%);}
.conf{position:absolute;border-radius:2px;opacity:0;}
.gift {
  position: absolute;
  top: 50%;        /* ← 追加 */
  left: 0;       /* ← 追加 */
  width: 100%;
  height: auto;
  transition: opacity 0.4s;
}
</style>
